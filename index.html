<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F6F4EF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14130F" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Control de costos, consumo y kilometraje de la flota." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <title>Flota — Control de costos</title>

    <script>
      // Antes del primer paint, para que no haya destello de tema equivocado.
      (() => {
        const saved = localStorage.getItem("fleet2:theme");
        const dark = saved
          ? saved === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
